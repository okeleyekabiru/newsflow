version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: newsflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/NewsFlow.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PostgreSQL=Host=postgres;Database=newsflow;Username=postgres;Password=yourpassword
      - ConnectionStrings__Redis=redis:6379
      # JWT — must be ≥ 32 chars for HS256
      - Jwt__Secret=newsflow-dev-secret-key-min-32-chars-ok!
      - Jwt__ExpiryMinutes=60
      - Jwt__RefreshExpiryDays=30
      # App
      - App__BaseUrl=http://localhost:5000
      - Cors__AllowedOrigins=http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  workers:
    build:
      context: .
      dockerfile: src/NewsFlow.Workers/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__PostgreSQL=Host=postgres;Database=newsflow;Username=postgres;Password=yourpassword
      - ConnectionStrings__Redis=redis:6379
      # Workers don't issue JWTs but the shared config key must resolve
      - Jwt__Secret=newsflow-dev-secret-key-min-32-chars-ok!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are intentionally empty — api.ts uses relative paths
      # which Next.js proxies to INTERNAL_API_URL (baked into routes-manifest at build time).
      args:
        - NEXT_PUBLIC_API_URL=
        - NEXT_PUBLIC_SIGNALR_URL=
        - INTERNAL_API_URL=http://api:8080
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
